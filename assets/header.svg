<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc">
  <title id="title">Rubiel González Labarta</title>
  <desc id="desc">Software and AI Architect, Engineering Leader and Builder</desc>

  <defs>
